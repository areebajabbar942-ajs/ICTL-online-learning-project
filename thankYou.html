<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Enrollment Successful</title>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background: url('https://images.pexels.com/photos/34030124/pexels-photo-34030124.jpeg') center/cover no-repeat fixed;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

/* MAIN BLOCK */
.box{
  width:90%;
  max-width:600px;
  background:#fff;
  border-radius:14px;
  overflow:hidden;
  box-shadow:0 6px 25px rgba(0,0,0,0.1);
}

/* TOP HEADER STRIP */
.top{
  background:rgb(152, 206, 206);
  height:10px;
}

/* HEADER */
.header{
  padding:20px;
  text-align:center;
  border-bottom:1px solid #eee;
}

.header h2{
  margin:0;
  font-family: serif;
  font-size:26px;
  color:#333;
}

/* CONTENT */
.content{
  padding:30px;
}

.content h1{
  font-size:30px;
  margin-bottom:15px;
  color:#222;
}

.content p{
  font-size:18px;
  color:#444;
  line-height:1.6;
  margin:10px 0;
}

.btn{
  display:inline-block;
  margin-top:25px;
  padding:12px 25px;
  background:#5dcbcb;
  color:#000;
  font-weight:600;
  border-radius:8px;
  text-decoration:none;
  transition:0.3s;
}

.btn:hover{
  background:#358484;
  transform:translateY(-2px);
}

/* FOOTER */
.footer{
  text-align:center;
  font-size:14px;
  color:#777;
  padding:15px;
  border-top:1px solid #eee;
}
</style>

</head>
<body>

<div class="box">

  <div class="top"></div>

  <div class="header">
    <h2>Online Learning Academy</h2>
  </div>

  <div class="content">
    <h1>Enrollment Successful</h1>

    <p>Thankyou for enrolling!</p>

    <p>
      Your payment receipt has been successfully submitted.
       After verification, you will be granted access to your classes and provided with the schedule.
    </p>

    <a href="index.html" class="btn">Submit another response</a>
  </div>

  <div class="footer">
    © Online Learning Academy | All Rights Reserved
  </div>

</div>

</body>
</html>
